<script>
/* テーマ初期適用（描画前・FOUC回避）: localStorage → prefers-color-scheme → dark */
(function(){
  try{
    var KEY="ai-shindan:theme", t=null;
    try{ t=localStorage.getItem(KEY); }catch(e){}
    if(t!=="dark" && t!=="light"){
      t=(window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches) ? "light" : "dark";
    }
    document.documentElement.setAttribute("data-theme", t);
  }catch(e){
    document.documentElement.setAttribute("data-theme","dark");
  }
})();
</script>

.rank-all summary::-webkit-details-marker{display:none}
.rank-list{border-top:1px solid var(--border);padding:var(--sp-2) var(--sp-3) var(--sp-3)}
.rank-row{display:flex;align-items:center;gap:var(--sp-2);width:100%;min-height:48px;text-align:left;border-radius:var(--radius-sm);padding:6px var(--sp-2)}
.rank-row:hover{background:var(--accent-soft)}
.rank-no{font-weight:800;font-variant-numeric:tabular-nums;color:var(--text-3);min-width:20px;flex:none}
.rank-name{flex:0 0 auto;max-width:42%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:700}
.rank-bar{flex:1;height:8px;background:var(--elevated);border-radius:var(--radius-full);overflow:hidden;min-width:40px}
.rank-bar-fill{display:block;height:100%;background:var(--grad-hero);border-radius:var(--radius-full)}
.rank-pct{flex:none}
/* 最狭幅では副業名を省略せず全文表示: 1行目=番号+名称(折り返し可)+%、2行目=バー全幅 */
@media(max-width:439.98px){
  .rank-row{flex-wrap:wrap;row-gap:6px}
  .rank-name{flex:1 1 auto;max-width:none;white-space:normal;overflow:visible;text-overflow:clip}
  .rank-pct{order:3}
  .rank-bar{order:4;flex:1 1 100%;min-width:0}
}

/* ============ 実践ページ（biz / list・無彩色基調） ============ */
.crumbs{margin-bottom:var(--sp-2)}
.biz-head p{margin-top:var(--sp-1)}
.why-card{border-left:4px solid var(--accent)}
.facts{display:grid;grid-template-columns:1fr;gap:var(--sp-3)}
@media(min-width:560px){.facts{grid-template-columns:repeat(3,1fr)}}
.fact h3{font-size:12px;color:var(--text-3);font-weight:700;margin-bottom:4px}
.stars{color:var(--warn);letter-spacing:2px}
.fit-label{margin-top:var(--sp-3)}
.fit-list{margin:var(--sp-2) 0 0 1.4em}
.fit-list li{margin-top:2px}

/* 全体像フロー図解（steps タイトルから自動生成。モバイル縦・520px以上で横フロー） */
.flow{display:flex;flex-direction:column;gap:var(--sp-2)}
.flow-step{display:flex;align-items:center;gap:var(--sp-3);background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:var(--sp-3)}
.flow-num{flex:none;width:30px;height:30px;border-radius:var(--radius-full);background:var(--accent-soft);color:var(--accent-text);font-weight:800;font-size:14px;display:flex;align-items:center;justify-content:center;font-variant-numeric:tabular-nums}
.flow-label{font-size:13px;font-weight:700;line-height:1.5}
.flow-arrow{align-self:center;color:var(--text-3);font-size:18px;line-height:1;transform:rotate(90deg)}
@media(min-width:520px){
  .flow{flex-direction:row;align-items:stretch}
  .flow-step{flex:1;flex-direction:column;align-items:center;text-align:center;gap:var(--sp-2)}
  .flow-arrow{transform:none;align-self:flex-start;margin-top:15px}
  .flow-label{font-size:12.5px}
}

/* こんな人に向いています（✓チップ・2列／モバイル1列） */
.fit-grid{display:grid;grid-template-columns:1fr;gap:var(--sp-2);margin-top:var(--sp-2)}
@media(min-width:520px){.fit-grid{grid-template-columns:1fr 1fr}}
.fit-chip{display:flex;align-items:flex-start;gap:var(--sp-2);background:var(--elevated);border:1px solid var(--border);border-radius:var(--radius-md);padding:var(--sp-3)}
.fit-chip .fit-check{color:var(--success);font-weight:800;flex:none}
.fit-chip .fit-txt{font-size:13px;line-height:1.6}

/* 診断理由（1句=1行・回答引用をチップ強調） */
.biz-summary{line-height:1.9}
.reason-list{display:flex;flex-direction:column;gap:var(--sp-2);margin-top:var(--sp-1)}
.reason-item{display:flex;align-items:flex-start;gap:var(--sp-2)}
.reason-ic{flex:none}
.reason-body{line-height:1.7}
.ans-chip{display:inline-block;background:var(--accent-soft);color:var(--accent-text);font-weight:700;border-radius:var(--radius-sm);padding:1px 8px;margin-right:2px}

/* ファクトカード: 高さ・密度をそろえてスキャンしやすく */
.fact{display:flex;flex-direction:column;gap:6px}
.fact .income-label{font-size:15px;font-weight:800;line-height:1.5}
.src-toggle{align-self:flex-start;margin-top:auto;color:var(--accent-text);font-weight:700;font-size:12px;min-height:36px;display:inline-flex;align-items:center;gap:4px}
.src-chev{transition:transform .2s ease}
.src-toggle[aria-expanded="true"] .src-chev{transform:rotate(180deg)}
.src-body{margin-top:6px}
.need-list{display:flex;flex-direction:column;gap:var(--sp-2)}
.need-item{display:flex;align-items:flex-start;gap:var(--sp-2)}
.need-ic{flex:none}
.need-txt{font-size:13px;line-height:1.6}
.acc{border:1px solid var(--border);border-radius:var(--radius-md);background:var(--surface);overflow:hidden}
.acc+.acc{margin-top:var(--sp-3)}
.acc-head-row{display:flex;align-items:center;gap:var(--sp-1);padding:0 var(--sp-2) 0 var(--sp-1)}
.acc-head{flex:1;display:flex;align-items:center;gap:var(--sp-2);min-height:56px;text-align:left;font-weight:700;padding:var(--sp-2) 0}
.acc-chev{margin-left:auto;transition:transform .2s ease;color:var(--text-3);flex:none}
.acc-head[aria-expanded="true"] .acc-chev{transform:rotate(180deg)}
.acc-body{padding:var(--sp-3) var(--sp-4) var(--sp-4);border-top:1px solid var(--border)}
.chk{display:flex;align-items:center;justify-content:center;min-width:44px;min-height:44px;flex:none;cursor:pointer}
.chk input{width:20px;height:20px;accent-color:var(--accent);cursor:pointer}
.step-no{font-size:11px;font-weight:800;color:var(--accent-text);background:var(--accent-soft);border-radius:var(--radius-full);padding:2px 8px;flex:none}
.step-body{margin-bottom:var(--sp-2)}
.prompt-card{background:var(--prompt-bg);border:1px solid var(--border);border-radius:var(--radius-md);padding:var(--sp-4);margin-top:var(--sp-3)}
.prompt-head{display:flex;align-items:center;justify-content:space-between;gap:var(--sp-2);flex-wrap:wrap}
.prompt-preview{white-space:pre-wrap;font-size:12.5px;line-height:1.7;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:var(--sp-3);max-height:220px;overflow-y:auto;overflow-x:auto;margin-top:var(--sp-3)}
.field{margin-top:var(--sp-3)}
.field label{display:block;font-size:12.5px;font-weight:700;margin-bottom:4px;color:var(--text-2)}
.field input{width:100%;min-height:44px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;font-size:16px}
details.qa-item{border:1px solid var(--border);border-radius:var(--radius-md);background:var(--surface)}
details.qa-item+details.qa-item{margin-top:var(--sp-2)}
details.qa-item summary{list-style:none;cursor:pointer;display:flex;align-items:center;gap:8px;min-height:52px;padding:var(--sp-2) var(--sp-4);font-weight:700}
details.qa-item summary::-webkit-details-marker{display:none}
.qa-mark{color:var(--accent-text);font-weight:800;flex:none}
.qa-a{padding:0 var(--sp-4) var(--sp-4);color:var(--text-2)}
.first-step{border-left:4px solid var(--success)}
.list-wrap{display:flex;flex-direction:column;gap:var(--sp-3)}
.list-card{display:block;width:100%;text-align:left}
.list-card:hover{border-color:var(--accent-ring)}
.meta-row{display:flex;flex-wrap:wrap;gap:var(--sp-3);font-size:12px;color:var(--text-2);margin-top:var(--sp-2)}

/* ============ トースト ============ */
#toastHost{position:fixed;left:0;right:0;bottom:24px;display:flex;justify-content:center;pointer-events:none;z-index:50;padding:0 var(--sp-4)}
.toast{background:var(--elevated);color:var(--text);border:1px solid var(--border);border-radius:var(--radius-full);padding:10px 20px;font-size:13px;font-weight:700;box-shadow:0 8px 24px rgba(0,0,0,.35);animation:toastIn .25s ease;max-width:100%;text-align:center}

/* ============ アニメーション ============ */
@keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes wipeUp{from{transform:translateY(110%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes confettiFall{0%{opacity:1;transform:translateY(0) rotate(0deg)}100%{opacity:0;transform:translateY(420px) rotate(560deg)}}
/* fadeUp は opacity のみ（transform で動かさない）。fade-up はクリック可能要素
   （hero内CTA / biz-chip / opt / list-card）に付くため、出現中に当たり判定が移動すると
   mousedown/mouseup が別要素に落ちてクリック不成立になりうる */
@keyframes fadeUp{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateX(28px)}to{opacity:1;transform:translateX(0)}}
.fade-up{animation:fadeUp .45s ease both}
.q-enter{animation:slideIn .3s ease both}
/* オーロラ・オーブの漂い / CTAのやわらかな発光（reduced-motionで無効＝静止） */
@keyframes orbA{0%,100%{transform:translate(0,0)}50%{transform:translate(28px,24px)}}
@keyframes orbB{0%,100%{transform:translate(0,0)}50%{transform:translate(-24px,-28px)}}
@keyframes orbC{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-20px,22px) scale(1.08)}}
@keyframes ctaGlow{0%,100%{box-shadow:0 10px 30px rgba(18,10,55,.22),0 0 0 0 rgba(255,255,255,.5)}50%{box-shadow:0 12px 34px rgba(18,10,55,.26),0 0 24px 6px rgba(255,255,255,.26)}}

/* ============ reduced motion（全アニメ無効） ============ */
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation:none !important;transition:none !important}
  .ana-icons span{opacity:1;transform:none}
  .type-name{animation:none !important}
}
</style>

<body>
<header class="site-head">
  <div class="site-head-in">
    <a id="brand" class="brand" href="#/"></a>
    <button id="themeToggle" class="theme-btn" type="button" aria-label="テーマ切り替え">☀️</button>
  </div>
</header>
<main id="app"></main>
<footer class="site-foot" id="footNote"></footer>
<div id="toastHost" aria-live="polite"></div>

<script>
'use strict';
(function(){
  var DATA = window.SHINDAN || {};
  var LS_PREFIX = "ai-shindan:";

  /* ---------- localStorage ヘルパ（プライベートモードでも落ちない） ---------- */
  function lsGet(key, fallback){
    try{ var v = localStorage.getItem(LS_PREFIX+key); return v==null?fallback:v; }catch(e){ return fallback; }
  }
  function lsSet(key, val){ try{ localStorage.setItem(LS_PREFIX+key, val); }catch(e){} }
  function lsRemove(key){ try{ localStorage.removeItem(LS_PREFIX+key); }catch(e){} }
  function lsGetJSON(key, fallback){
    var raw = lsGet(key, null);
    if(raw==null) return fallback;
    try{ var parsed = JSON.parse(raw); return (parsed && typeof parsed==="object") ? parsed : fallback; }catch(e){ return fallback; }
  }
  function lsSetJSON(key, obj){ lsSet(key, JSON.stringify(obj)); }

  /* ---------- DOM ヘルパ（el()+textContent のみでDOM構築） ---------- */
  function el(tag, cls, text){
    var e = document.createElement(tag);
    if(cls) e.className = cls;
    if(text!=null) e.textContent = text;
    return e;
  }
  function prefersReducedMotion(){
    return !!(window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches);
  }

  var app = document.getElementById("app");

  /* ---------- トースト / コピー ---------- */
  var toastTimer = null;
  function showToast(msg){
    var host = document.getElementById("toastHost");
    host.textContent = "";
    host.appendChild(el("div","toast", msg));
    if(toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ host.textContent = ""; }, 2200);
  }
  function fallbackCopy(text, cb){
    try{
      var ta = document.createElement("textarea");
      ta.value = text;
      ta.setAttribute("readonly","");
      ta.style.position = "fixed"; ta.style.top = "-1000px"; ta.style.left = "-1000px";
      document.body.appendChild(ta);
      ta.select();
      ta.setSelectionRange(0, text.length);
      var ok = document.execCommand("copy");
      document.body.removeChild(ta);
      cb(!!ok);
    }catch(e){ cb(false); }
  }
  function doCopy(text, btnEl){
    function done(ok){
      if(!ok){ showToast("コピーに失敗しました"); return; }
      var original = btnEl.textContent;
      btnEl.textContent = "✓ コピーしました";
      btnEl.classList.add("copied");
      showToast("コピーしました");
      setTimeout(function(){ btnEl.textContent = original; btnEl.classList.remove("copied"); }, 1600);
    }
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(function(){ done(true); }, function(){ fallbackCopy(text, done); });
    } else {
      fallbackCopy(text, done);
    }
  }

  /* ---------- AIツールで開く（唯一の外部遷移＝ユーザー操作による新規タブ起動） ----------
     chatgpt.com/?q= と claude.ai/new?q= は入力欄プリフィル用URLに対応（自動送信なし）。
     chatgpt.com はURLがおよそ5000〜6000文字を境にHTTP 431で拒否されるため、
     余裕をみた安全上限（3500文字）を超えるときはプリフィルを諦めてコピー＋素のURLで開く。
     ※現行データでは全プロンプトがデフォルト値でも上限を超えるため、実運用は常に
       このフォールバック経路（コピー＋素のURL＋貼り付け案内トースト）で動く。
       これは意図した安全設計。プリフィル分岐は削除せず、短いプロンプト用に残している。
     モバイルはカスタムスキーム（iOS）/ intent（Android）でアプリ起動を試み、
     1800ms 以内に画面が切り替わらなければWeb版へフォールバックする。 */
  var IS_IOS = /iPhone|iPad|iPod/.test(navigator.userAgent) || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
  var IS_ANDROID = /Android/.test(navigator.userAgent);
  var AI_PREFILL_SAFE_LIMIT = 3500;
  var AI_DESTINATIONS = {
    chatgpt: {
      label:"ChatGPT", base:"https://chatgpt.com/",
      withQuery:function(t){ return "https://chatgpt.com/?q="+encodeURIComponent(t); },
      iosScheme:"chatgpt://", androidPackage:"com.openai.chatgpt", androidIntentPath:"chatgpt.com/"
    },
    claude: {
      label:"Claude", base:"https://claude.ai/new",
      withQuery:function(t){ return "https://claude.ai/new?q="+encodeURIComponent(t); },
      iosScheme:"claude://", androidPackage:"com.anthropic.claude", androidIntentPath:"claude.ai/new"
    }
  };
  function openInAI(text, destKey, btnEl){
    var dest = AI_DESTINATIONS[destKey];
    if(!dest) return;
    function goMobile(webUrl, appUrl){
      var timer = setTimeout(function(){
        if(!document.hidden){ location.href = webUrl; }
      }, 1800);
      function cancelFallback(){
        clearTimeout(timer);
        document.removeEventListener("visibilitychange", cancelFallback);
        window.removeEventListener("pagehide", cancelFallback);
      }
      document.addEventListener("visibilitychange", cancelFallback);
      window.addEventListener("pagehide", cancelFallback);
      location.href = appUrl;
    }
    function done(ok){
      /* コピーの成否に関わらず開く動作は必ず実行。失敗の影響はトースト文言のみ */
      var withQueryUrl = dest.withQuery(text);
      var prefilled = withQueryUrl.length <= AI_PREFILL_SAFE_LIMIT;
      var webUrl = prefilled ? withQueryUrl : dest.base;
      var isMobile = IS_IOS || IS_ANDROID;
      var original = btnEl.textContent;
      btnEl.textContent = ok
        ? (isMobile ? "✓ コピーしました" : ("✓ " + dest.label + "を開きました"))
        : "開いています…";
      btnEl.classList.add("opened");
      setTimeout(function(){ btnEl.textContent = original; btnEl.classList.remove("opened"); }, 1600);

      var copyFailNote = "コピーに失敗しました。手動でコピーして貼り付けてください。";

      if(IS_IOS){
        showToast(ok
          ? "コピーしました。開いた画面に貼り付けてください（アプリが無い場合はブラウザ版が開きます）"
          : (copyFailNote+"（アプリが無い場合はブラウザ版が開きます）"));
        goMobile(webUrl, dest.iosScheme);
        return;
      }
      if(IS_ANDROID){
        showToast(ok
          ? "コピーしました。開いた画面に貼り付けてください（アプリが無い場合はブラウザ版が開きます）"
          : (copyFailNote+"（アプリが無い場合はブラウザ版が開きます）"));
        var intentUrl = "intent://"+dest.androidIntentPath+"#Intent;scheme=https;package="+dest.androidPackage+";S.browser_fallback_url="+encodeURIComponent(webUrl)+";end";
        goMobile(webUrl, intentUrl);
        return;
      }
      if(prefilled){
        showToast(dest.label+"に入力した状態で開きました");
      } else {
        showToast(ok ? ("コピーしました。開いた"+dest.label+"に貼り付けてください") : copyFailNote);
      }
      window.open(webUrl, "_blank", "noopener");
    }
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(function(){ done(true); }, function(){ fallbackCopy(text, done); });
    } else {
      fallbackCopy(text, done);
    }
  }

  /* ---------- データアクセサ ---------- */
  function questions(){ return Array.isArray(DATA.questions) ? DATA.questions : []; }
  function businesses(){ return Array.isArray(DATA.businesses) ? DATA.businesses : []; }
  function findBiz(id){
    var bs = businesses();
    for(var i=0;i<bs.length;i++){ if(bs[i] && bs[i].id===id) return bs[i]; }
    return null;
  }
  function findById(arr, id){
    arr = Array.isArray(arr) ? arr : [];
    for(var i=0;i<arr.length;i++){ if(arr[i] && arr[i].id===id) return arr[i]; }
    return null;
  }
  function findOption(q, oid){ return q && Array.isArray(q.options) ? findById(q.options, oid) : null; }
  function profileFieldById(id){ return findById(DATA.profileFields, id); }
  function getAnswers(){ return lsGetJSON("answers", {}); }
  function answersComplete(a){
    var qs = questions();
    if(!qs.length) return false;
    for(var i=0;i<qs.length;i++){
      if(!a || !a[qs[i].id] || !findOption(qs[i], a[qs[i].id])) return false;
    }
    return true;
  }
  function getResult(){
    var r = lsGetJSON("result", null);
    if(!r || r.v!==1 || !r.top || !Array.isArray(r.ranking) || !r.ranking.length) return null;
    return r;
  }
  function getProfile(){ return lsGetJSON("profile", {}); }

  /* ---------- 採点エンジン（整数交差乗算） ---------- */
  function computeRanking(answers, data) {
    var qs = data.questions;
    var ids = data.businesses.map(function (b) { return b.id; });
    var chosen = qs.map(function (q) {
      return q.options.find(function (o) { return o.id === answers[q.id]; });
    });
    var smax = {}, score = {}, pct = {};
    ids.forEach(function (id) {
      smax[id] = qs.reduce(function (s, q) {
        return s + Math.max.apply(null, q.options.map(function (o) { return o.weights[id]; }));
      }, 0);
      score[id] = chosen.reduce(function (s, o) { return s + o.weights[id]; }, 0);
      pct[id] = Math.max(0, Math.round(100 * score[id] / smax[id]));
    });
    var qIndexById = {};
    qs.forEach(function (q, i) { qIndexById[q.id] = i; });
    var ranked = ids.slice().sort(function (a, b) {
      var d = score[b] * smax[a] - score[a] * smax[b]; // 正規化スコア降順（整数交差乗算）
      if (d !== 0) return d;
      var tbq = data.scoring.tiebreakQuestionOrder;
      for (var i = 0; i < tbq.length; i++) {
        var qi = qIndexById[tbq[i]];
        var wa = chosen[qi].weights[a], wb = chosen[qi].weights[b];
        if (wa !== wb) return wb - wa; // 獲得重みが大きい方が上位
      }
      return data.scoring.tiebreakOrder.indexOf(a) - data.scoring.tiebreakOrder.indexOf(b);
    });
    return { ranked: ranked, pct: pct, score: score, smax: smax };
  }

  /* ---------- 結果の演出ロジック ---------- */
  function tierLabel(p){
    var ts = (DATA.scoring && Array.isArray(DATA.scoring.tiers)) ? DATA.scoring.tiers : [];
    for(var i=0;i<ts.length;i++){ if(p >= ts[i].min) return ts[i].label; }
    return ts.length ? ts[ts.length-1].label : "";
  }
  function typeNameFor(topBiz, answers){
    var mod = "";
    if(DATA.resultCopy && DATA.resultCopy.q2Modifier && answers && answers.q2){
      mod = DATA.resultCopy.q2Modifier[answers.q2] || "";
    }
    return mod + (topBiz.archetype || "");
  }
  function reasonSentence(biz, answers){
    var items = [];
    questions().forEach(function(q, qi){
      var oid = answers && answers[q.id];
      if(!oid) return;
      var o = findOption(q, oid);
      if(!o || !o.weights) return;
      var w = o.weights[biz.id];
      if(typeof w === "number" && w >= 2){
        var r = biz.reasons && biz.reasons[q.id+":"+oid];
        if(r) items.push({ w:w, qi:qi, text:r });
      }
    });
    items.sort(function(a,b){ return (b.w - a.w) || (a.qi - b.qi); }); // 重み降順→質問順
    var picked = items.slice(0,3).map(function(x){ return x.text; });
    if(!picked.length) return biz.defaultReason || "";
    var joiners = (DATA.resultCopy && Array.isArray(DATA.resultCopy.reasonJoiners) && DATA.resultCopy.reasonJoiners.length)
      ? DATA.resultCopy.reasonJoiners : ["さらに、","そして、"];
    var s = picked[0];
    for(var i=1;i<picked.length;i++){ s += joiners[(i-1) % joiners.length] + picked[i]; }
    return s;
  }
  function fillShareTemplate(tpl, map){
    var out = tpl;
    Object.keys(map).forEach(function(k){ out = out.split("{"+k+"}").join(map[k]); });
    return out;
  }
  /* 診断理由を「1句=1要素」の配列で返す（reasonSentence と同じ選定・接続詞なし。実践ページの行分解用） */
  function reasonPhrases(biz, answers){
    var items = [];
    questions().forEach(function(q, qi){
      var oid = answers && answers[q.id];
      if(!oid) return;
      var o = findOption(q, oid);
      if(!o || !o.weights) return;
      var w = o.weights[biz.id];
      if(typeof w === "number" && w >= 2){
        var r = biz.reasons && biz.reasons[q.id+":"+oid];
        if(r) items.push({ w:w, qi:qi, text:r });
      }
    });
    items.sort(function(a,b){ return (b.w - a.w) || (a.qi - b.qi); });
    var picked = items.slice(0,3).map(function(x){ return x.text; });
    if(!picked.length && biz.defaultReason) picked = [biz.defaultReason];
    return picked;
  }
  /* 理由句の先頭「回答引用」をチップとして立てる（表示装飾のみ・textContentで安全に構築） */
  function appendReasonBody(container, text){
    var m = /^「([^」]+)」([\s\S]*)$/.exec(String(text || ""));
    if(m){
      container.appendChild(el("span","ans-chip", m[1]));
      container.appendChild(document.createTextNode(m[2]));
    } else {
      container.appendChild(document.createTextNode(String(text || "")));
    }
  }
  /* 「必要なもの」テキストから内容に合う絵文字を選ぶ（表示装飾のみ・該当なしは✓） */
  function needIcon(t){
    t = String(t || "");
    var map = [
      [/chatgpt|claude|gpt|\bai\b|ＡＩ|生成/i, "🤖"],
      [/スマホ|携帯|カメラ|撮影|写真/, "📱"],
      [/印刷|プリンタ|プリント/, "🖨"],
      [/canva|デザイン|バナー/i, "🎨"],
      [/メルカリ|フリマ|出品|販売|ストア|ショップ|etsy|booth/i, "🛒"],
      [/zoom|通話|オンライン|ビデオ|会議/i, "🎥"],
      [/note|ブログ|文章|ライティング|記事|執筆/i, "✍️"],
      [/アカウント|登録|サイト|チケット/, "🔑"],
      [/pc|パソコン|ネット環境|回線|端末/i, "💻"],
      [/時間|平日|週末/, "⏰"],
      [/お金|費用|資金|手数料|円/, "💰"]
    ];
    for(var i=0;i<map.length;i++){ if(map[i][0].test(t)) return map[i][1]; }
    return "✓";
  }
  function starStr(n){
    n = Math.max(0, Math.min(5, n|0));
    var s = "";
    for(var i=0;i<5;i++){ s += (i<n) ? "★" : "☆"; }
    return s;
  }
  function boltStr(n){
    n = Math.max(0, Math.min(5, n|0));
    var s = "";
    for(var i=0;i<n;i++){ s += "⚡"; }
    return s || "-";
  }

  /* ---------- ハッシュルーター ---------- */
  var quizIdx = 0;

  /* a11y: ルート遷移・質問送りで見出しへフォーカスを移す。
     これが無いと SPA の画面切り替えがスクリーンリーダーに通知されず、
     キーボード利用者も毎回ヘッダーから Tab し直しになる */
  function moveFocus(node, preventScroll){
    if(!node) return;
    node.setAttribute("tabindex","-1");
    try{ node.focus(preventScroll ? { preventScroll:true } : undefined); }
    catch(e){ try{ node.focus(); }catch(e2){} }
  }
  var routeFocusArmed = false;  /* 初回描画（ページロード直後）ではフォーカスを奪わない */
  function afterRouteFocus(navigated){

  }

  function render(){
    profileUpdaters = [];

    var navigated = routeFocusArmed;
    routeFocusArmed = true;

    if(h==="#/" || h==="#"){ renderHome(); afterRouteFocus(navigated); return; }
    if(h==="#/quiz"){ renderQuiz(); return; }  /* 質問見出しへのフォーカスは renderQuestion() が行う */
    if(h==="#/analyzing"){ renderAnalyzing(); return; }  /* role=status のライブ領域が通知する（すぐ #/result に遷移） */
    if(h==="#/result"){

  /* ---------- 診断（#/quiz） ---------- */
  function firstUnanswered(){
    var a = getAnswers();
    var qs = questions();
    for(var i=0;i<qs.length;i++){
      if(!a[qs[i].id] || !findOption(qs[i], a[qs[i].id])) return i;
    }
    return qs.length ? qs.length-1 : 0;
  }
  var quizBusy = false;
  function renderQuiz(){
    if(!questions().length){ location.replace("#/"); return; }
    /* 途中離脱は続きから再開。全問回答済みで直接 #/quiz に来た場合
       （一覧ページのCTA・URL直打ち等）は質問5ではなく質問1から */
    quizIdx = answersComplete(getAnswers()) ? 0 : firstUnanswered();
    renderQuestion(false);
  }
  function renderQuestion(animate){
    quizBusy = false;
    var qs = questions();
    if(quizIdx < 0) quizIdx = 0;
    if(quizIdx > qs.length-1) quizIdx = qs.length-1;
    var q = qs[quizIdx];
    var a = getAnswers();
    app.textContent = "";
    var panel = el("div", (animate && !prefersReducedMotion()) ? "q-panel q-enter" : "q-panel");

    var pw = el("div","progress-wrap");
    pw.appendChild(el("span","progress-label","質問 "+(quizIdx+1)+"/"+qs.length));
    var bar = el("div","progress");
    bar.setAttribute("role","progressbar");
    bar.setAttribute("aria-valuemin","0");
    bar.setAttribute("aria-valuemax", String(qs.length));
    bar.setAttribute("aria-valuenow", String(quizIdx+1));
    bar.setAttribute("aria-valuetext","質問"+(quizIdx+1)+"/"+qs.length);
    bar.setAttribute("aria-label","診断の進み具合");
    var fill = el("div","progress-fill");
    fill.style.width = ((quizIdx+1) / qs.length * 100)+"%";
    bar.appendChild(fill);
    pw.appendChild(bar);
    panel.appendChild(pw);

    var qHead = el("h1","q-text", q.text);
    panel.appendChild(qHead);

    var group = el("div","opts");
    group.setAttribute("role","radiogroup");
    group.setAttribute("aria-label", q.text);
    var cards = [];
    q.options.forEach(function(o, i){
      var c = el("button","opt fade-up");
      c.type = "button";
      if(!prefersReducedMotion()) c.style.animationDelay = (i*0.05)+"s";
      c.setAttribute("role","radio");
      c.setAttribute("aria-checked", a[q.id]===o.id ? "true" : "false");
      c.appendChild(el("span","opt-icon", o.icon));
      c.appendChild(el("span","opt-label", o.label));
      c.addEventListener("click", function(){ pick(o, c); });
      cards.push(c);
      group.appendChild(c);
    });
    function setTabStops(){
      var checkedIdx = -1;
      cards.forEach(function(c, i){ if(c.getAttribute("aria-checked")==="true") checkedIdx = i; });
      var stop = checkedIdx>=0 ? checkedIdx : 0;
      cards.forEach(function(c, i){ c.tabIndex = (i===stop) ? 0 : -1; });
    }
    setTabStops();
    group.addEventListener("keydown", function(ev){
      var idx = cards.indexOf(document.activeElement);
      if(idx < 0) return;
      var next = null;
      if(ev.key==="ArrowDown" || ev.key==="ArrowRight") next = (idx+1) % cards.length;
      else if(ev.key==="ArrowUp" || ev.key==="ArrowLeft") next = (idx-1+cards.length) % cards.length;
      if(next!=null){ ev.preventDefault(); cards[next].focus(); }
    });
    panel.appendChild(group);

    var nav = el("div","quiz-nav");
    if(quizIdx > 0){
      var back = el("button","btn-ghost btn-sm","← 前の質問");
      back.type = "button";
      back.addEventListener("click", function(){ quizIdx--; renderQuestion(false); });
      nav.appendChild(back);
    } else {
      var home = el("button","btn-ghost btn-sm","← トップへ戻る");
      home.type = "button";
      home.addEventListener("click", function(){ location.hash = "#/"; });
      nav.appendChild(home);
    }
    panel.appendChild(nav);
    app.appendChild(panel);

    /* a11y: 新しい質問の見出しへフォーカス（SRが質問文を読み上げ、Tab1回で選択肢に届く） */
    moveFocus(qHead);

    function pick(o, card){
      if(quizBusy) return;
      quizBusy = true;
      var ans = getAnswers();
      ans[q.id] = o.id;
      lsSetJSON("answers", ans);  /* 回答は都度保存（リロード復帰用） */
      cards.forEach(function(c){ c.setAttribute("aria-checked", c===card ? "true" : "false"); });
      setTabStops();
      if(prefersReducedMotion()){ advance(); return; }
      card.classList.add("just-picked");
      setTimeout(advance, 300);  /* 300msの選択フィードバック */
    }
    function advance(){
      if(quizIdx >= qs.length-1){ location.hash = "#/analyzing"; }
      else { quizIdx++; renderQuestion(true); }
    }
  }

  /* ---------- 分析中（#/analyzing 約1.8秒・タップでスキップ） ---------- */
  var anaTimers = [];

  }
  function renderAnalyzing(){
    var a = getAnswers();
    var qs = questions();
    if(!answersComplete(a)){ location.replace(qs.length ? "#/quiz" : "#/"); return; }

    /* 採点はここで実行して保存（スキップしても結果が出せる） */
    var res = computeRanking(a, DATA);
    var ranking = res.ranked.map(function(id){ return { id:id, pct:res.pct[id] }; });
    lsSetJSON("result", { v:1, at:new Date().toISOString(), top:res.ranked[0], ranking:ranking });

    app.textContent = "";
    var wrap = el("div","analyzing");
    wrap.setAttribute("role","status");
    var icons = el("div","ana-icons");
    icons.setAttribute("aria-hidden","true");
    var spans = qs.map(function(q){
      var o = findOption(q, a[q.id]);

      return s;
    });
    wrap.appendChild(icons);

    var skipBtn = el("button","btn-ghost ana-skip","スキップ →");
    skipBtn.type = "button";
    skipBtn.setAttribute("aria-label","分析をスキップして診断結果を見る");
    skipBtn.addEventListener("click", function(ev){ ev.stopPropagation(); go(); });
    wrap.appendChild(skipBtn);
    wrap.appendChild(el("p","note","画面をタップしてもスキップできます"));
    app.appendChild(wrap);

    function go(){
      clearAnaTimers();
      if(location.hash==="#/analyzing") location.replace("#/result");
    }
    if(prefersReducedMotion()){ go(); return; }  /* reduced-motion は即遷移 */
    spans.forEach(function(s, i){
      anaTimers.push(setTimeout(function(){ s.classList.add("lit"); }, 200 + i*280));
    });
    anaTimers.push(setTimeout(go, 1800));
    wrap.addEventListener("click", go);
  }

        var track = el("span","rank-bar");
        var rf = el("span","rank-bar-fill");
        rf.style.width = Math.max(0, Math.min(100, x.pct))+"%";
        track.appendChild(rf);
        rowBtn.appendChild(track);
        rowBtn.appendChild(el("span","bar-pct rank-pct", x.pct+"%"));
        rowBtn.addEventListener("click", function(){ location.hash = "#/biz/"+b.id; });
        lst.appendChild(rowBtn);
      });
      det.appendChild(lst);
      moreSec.appendChild(det);
      app.appendChild(moreSec);
    }

    /* シェアコピー＋再診断 */
    var actSec = el("section","section btn-row");
    var share = el("button","btn","結果をテキストでコピー");
    share.type = "button";
    share.addEventListener("click", function(){
      var tpl = (DATA.resultCopy && DATA.resultCopy.shareTextTemplate) || "";
      var text = fillShareTemplate(tpl, {
        type_name: typeNameFor(top, a),
        biz_name: top.name,
        pct: String(pctTop),
        app_name: DATA.appName || ""
      });
      doCopy(text, share);
    });
    actSec.appendChild(share);
    var retry = el("button","btn","もう一度診断する");
    retry.type = "button";
    retry.addEventListener("click", function(){
      lsRemove("answers");
      lsRemove("result");
      quizIdx = 0;
      location.hash = "#/quiz";  /* theme / profile / step は残す */
    });
    actSec.appendChild(retry);
    app.appendChild(actSec);
  }

  /* ---------- プロンプトカード（変数置換プレビュー＋コピー＋AIで開く） ---------- */
  function buildPromptCard(biz, p){
    var card = el("div","prompt-card");
    var head = el("div","prompt-head");
    head.appendChild(el("p","label", p.title));
    var destLabel = p.dest==="both" ? "ChatGPT / Claude 対応" : (p.dest==="chatgpt" ? "ChatGPT向け" : "Claude向け");
    head.appendChild(el("span","note", destLabel));
    card.appendChild(head);
    if(p.note) card.appendChild(el("p","note", p.note));

    var localVals = {};
    var preview = el("div","prompt-preview");
    preview.setAttribute("aria-label","プロンプトのプレビュー");

    function composed(){
      var out = p.template;
      (Array.isArray(p.vars) ? p.vars : []).forEach(function(v){
        var val = "";
        if(v.from === "profile"){
          var prof = getProfile();
          val = prof[v.id];
          if(val==null || String(val).trim()===""){
            var f = profileFieldById(v.id);
            val = f && f.default != null ? f.default : "";
          }
        } else {
          val = localVals[v.id];
          if(val==null || String(val).trim()==="") val = v.default != null ? v.default : "";
        }
        out = out.split("{"+v.id+"}").join(String(val));  /* 空欄はdefaultで埋める＝未置換の中括弧を残さない */
      });
      return out;
    }
    function updatePreview(){ preview.textContent = composed(); }

    (Array.isArray(p.vars) ? p.vars : []).forEach(function(v){
      var field = el("div","field");
      var inputId = "in-"+biz.id+"-"+p.id+"-"+v.id;
      var lab = el("label", null);
      lab.htmlFor = inputId;
      var input = document.createElement("input");
      input.type = "text";
      input.id = inputId;
      if(v.from === "profile"){
        var f = profileFieldById(v.id);
        lab.textContent = (f ? f.label : v.id)+"（全ページ共通のプロフィール）";
        if(f && f.placeholder) input.placeholder = f.placeholder;
        var prof = getProfile();
        input.value = prof[v.id] != null ? String(prof[v.id]) : "";
        input.addEventListener("input", function(){
          var pr = getProfile();
          pr[v.id] = input.value;
          lsSetJSON("profile", pr);  /* プロフィールは全ページ共有で永続化 */
          profileUpdaters.forEach(function(u){ u(); });
        });
        profileUpdaters.push(function(){
          if(document.activeElement !== input){
            var pr2 = getProfile();
            input.value = pr2[v.id] != null ? String(pr2[v.id]) : "";
          }
          updatePreview();
        });
      } else {
        lab.textContent = v.label || v.id;
        if(v.placeholder) input.placeholder = v.placeholder;
        input.addEventListener("input", function(){
          localVals[v.id] = input.value;
          updatePreview();
        });
      }
      field.appendChild(lab);
      field.appendChild(input);
      card.appendChild(field);
    });

    updatePreview();
    card.appendChild(preview);

    var row = el("div","btn-row");
    var copyBtn = el("button","btn btn-sm","プロンプトをコピー");
    copyBtn.type = "button";
    copyBtn.addEventListener("click", function(){ doCopy(composed(), copyBtn); });
    row.appendChild(copyBtn);
    if(p.dest==="chatgpt" || p.dest==="both"){
      var gBtn = el("button","btn btn-sm","ChatGPTで開く");
      gBtn.type = "button";
      gBtn.addEventListener("click", function(){ openInAI(composed(), "chatgpt", gBtn); });
      row.appendChild(gBtn);
    }
    if(p.dest==="claude" || p.dest==="both"){
      var cBtn = el("button","btn btn-sm","Claudeで開く");
      cBtn.type = "button";
      cBtn.addEventListener("click", function(){ openInAI(composed(), "claude", cBtn); });
      row.appendChild(cBtn);
    }
    card.appendChild(row);
    return card;
  }

  /* ---------- 実践ページ（#/biz/<id>） ---------- */
  function renderBiz(b){
    app.textContent = "";

    var crumb = el("p","crumbs");
    var backLink = el("a",null,"← 副業一覧へ");
    backLink.href = "#/list";
    crumb.appendChild(backLink);
    app.appendChild(crumb);

    var head = el("header","biz-head");
    head.appendChild(el("h1",null, b.name));
    if(b.catch) head.appendChild(el("p","muted", b.catch));
    app.appendChild(head);

    /* 全体像フロー図解（steps タイトルから自動生成。まず流れを掴む） */
    var stepsArr = Array.isArray(b.steps) ? b.steps : [];
    if(stepsArr.length){
      var flowSec = el("section","section");
      flowSec.appendChild(el("h2","h-sec","この副業の全体像"));
      var flow = el("div","flow");
      stepsArr.forEach(function(s, i){
        var st = el("div","flow-step");
        st.appendChild(el("span","flow-num", String(i+1)));
        st.appendChild(el("span","flow-label", s.title || ""));
        flow.appendChild(st);
        if(i < stepsArr.length-1){
          var ar = el("span","flow-arrow","→");
          ar.setAttribute("aria-hidden","true");
          flow.appendChild(ar);
        }
      });
      flowSec.appendChild(flow);
      app.appendChild(flowSec);
    }

    /* ① どんな副業?（フロー図解の後・本文は行間ゆったりで圧迫感を減らす） */
    var sum = el("section","section card");
    sum.appendChild(el("h2","h-sec","どんな副業?"));
    sum.appendChild(el("p","biz-summary", b.summary || ""));
    app.appendChild(sum);

    /* こんな人に向いています（✓チップ・2列グリッド） */
    if(Array.isArray(b.fit) && b.fit.length){
      var fitSec = el("section","section");
      fitSec.appendChild(el("h2","h-sec","こんな人に向いています"));
      var fg = el("div","fit-grid");
      b.fit.forEach(function(f){
        var chip = el("div","fit-chip");
        var ck = el("span","fit-check","✓");
        ck.setAttribute("aria-hidden","true");
        chip.appendChild(ck);
        chip.appendChild(el("span","fit-txt", f));
        fg.appendChild(chip);
      });
      fitSec.appendChild(fg);
      app.appendChild(fitSec);
    }

    /* 診断◯%だった理由（結果がありTOP3のときのみ。直リンクでも成立）
       長い連結文をやめ、理由句1つ=1行に分解（回答引用をチップ強調・接続詞は使わない） */
    var r = getResult();
    if(r){
      var rankIdx = -1;
      r.ranking.forEach(function(x, i){ if(x.id===b.id) rankIdx = i; });
      if(rankIdx >= 0 && rankIdx < 3){
        var ans = getAnswers();
        var why = el("section","section card why-card");
        why.appendChild(el("h2","h-sec","診断で適性"+r.ranking[rankIdx].pct+"%（"+(rankIdx+1)+"位）だった理由"));
        var rlist = el("div","reason-list");
        reasonPhrases(b, ans).forEach(function(pt){
          var item = el("div","reason-item");
          var ic = el("span","reason-ic","💡");
          ic.setAttribute("aria-hidden","true");
          item.appendChild(ic);
          var body = el("span","reason-body");
          appendReasonBody(body, pt);
          item.appendChild(body);
          rlist.appendChild(item);
        });
        why.appendChild(rlist);
        app.appendChild(why);
      }
    }

    /* ② ファクト3枚（高さ・密度をそろえてスキャンしやすく） */
    var facts = el("section","section facts");

    var f1 = el("div","card fact");
    f1.appendChild(el("h3",null,"収益の目安"));
    f1.appendChild(el("p","income-label", b.income ? b.income.label : ""));
    if(b.income && b.income.note){
      var srcBtn = el("button","src-toggle");
      srcBtn.type = "button";
      srcBtn.setAttribute("aria-expanded","false");
      srcBtn.appendChild(el("span",null,"根拠・出典を見る"));
      srcBtn.appendChild(el("span","src-chev","▾"));
      var srcBody = el("p","note src-body", b.income.note);
      srcBody.hidden = true;
      srcBtn.addEventListener("click", function(){
        var open = srcBtn.getAttribute("aria-expanded")==="true";
        srcBtn.setAttribute("aria-expanded", open ? "false" : "true");
        srcBody.hidden = open;
      });
      f1.appendChild(srcBtn);
      f1.appendChild(srcBody);
    }
    facts.appendChild(f1);

    var f2 = el("div","card fact");
    f2.appendChild(el("h3",null,"必要なもの"));
    var nlist = el("div","need-list");
    (Array.isArray(b.needs) ? b.needs : []).forEach(function(n){
      var it = el("div","need-item");
      var ic2 = el("span","need-ic", needIcon(n));
      ic2.setAttribute("aria-hidden","true");
      it.appendChild(ic2);
      it.appendChild(el("span","need-txt", n));
      nlist.appendChild(it);
    });
    f2.appendChild(nlist);
    facts.appendChild(f2);

    var f3 = el("div","card fact");
    f3.appendChild(el("h3",null,"初収益までの目安"));
    f3.appendChild(el("p","income-label", b.timeToStart || ""));
    var meta = el("p","note");
    var dStar = el("span","stars", starStr(b.difficulty));
    dStar.setAttribute("role","img");
    dStar.setAttribute("aria-label","むずかしさ "+b.difficulty+"／5段階");
    meta.appendChild(dStar);
    var dLab = el("span",null," むずかしさ ／ ");
    dLab.setAttribute("aria-hidden","true");
    meta.appendChild(dLab);
    meta.appendChild(el("span",null, boltStr(b.speed)));
    meta.appendChild(document.createTextNode(" 初収益の速さ"));
    f3.appendChild(meta);
    facts.appendChild(f3);
    app.appendChild(facts);

    /* ③④ STEPアコーディオン＋プロンプトカード */
    var steps = Array.isArray(b.steps) ? b.steps : [];
    var stepSec = el("section","section");
    stepSec.appendChild(el("h2","h-sec","はじめかた（STEP）"));
    var pw = el("div","progress-wrap");
    var progLabel = el("span","progress-label");
    var prog = el("div","progress");
    prog.setAttribute("role","progressbar");
    prog.setAttribute("aria-valuemin","0");
    prog.setAttribute("aria-valuemax", String(steps.length));
    prog.setAttribute("aria-label","STEPの達成状況");
    var progFill = el("div","progress-fill plain");
    prog.appendChild(progFill);
    pw.appendChild(progLabel);
    pw.appendChild(prog);
    stepSec.appendChild(pw);
    function updateProg(){
      var d = 0;
      steps.forEach(function(s){ if(lsGet("step:"+b.id+":"+s.id, null)==="1") d++; });
      progLabel.textContent = "達成 "+d+"/"+steps.length;
      prog.setAttribute("aria-valuenow", String(d));
      progFill.style.width = (steps.length ? d/steps.length*100 : 0)+"%";
    }
    steps.forEach(function(s, i){
      var acc = el("div","acc");
      var headRow = el("div","acc-head-row");
      var chk = el("label","chk");
      var cb = document.createElement("input");
      cb.type = "checkbox";
      cb.checked = lsGet("step:"+b.id+":"+s.id, null)==="1";
      cb.setAttribute("aria-label","STEP"+(i+1)+"「"+s.title+"」を完了にする");
      cb.addEventListener("change", function(){
        if(cb.checked) lsSet("step:"+b.id+":"+s.id, "1");
        else lsRemove("step:"+b.id+":"+s.id);
        updateProg();
      });
      chk.appendChild(cb);
      var headBtn = el("button","acc-head");
      headBtn.type = "button";
      headBtn.setAttribute("aria-expanded", i===0 ? "true" : "false");
      headBtn.appendChild(el("span","step-no","STEP "+(i+1)));
      headBtn.appendChild(el("span",null, s.title));
      headBtn.appendChild(el("span","acc-chev","▾"));
      var body = el("div","acc-body");
      if(i!==0) body.hidden = true;
      headBtn.addEventListener("click", function(){
        var open = headBtn.getAttribute("aria-expanded")==="true";
        headBtn.setAttribute("aria-expanded", open ? "false" : "true");
        body.hidden = open;
      });
      body.appendChild(el("p","step-body", s.body));
      (Array.isArray(s.promptIds) ? s.promptIds : []).forEach(function(pid){
        var p = findById(b.prompts, pid);
        if(p) body.appendChild(buildPromptCard(b, p));
      });
      headRow.appendChild(chk);
      headRow.appendChild(headBtn);
      acc.appendChild(headRow);
      acc.appendChild(body);
      stepSec.appendChild(acc);
    });
    updateProg();
    app.appendChild(stepSec);

    /* ⑤ つまずきQ&A */
    if(Array.isArray(b.qa) && b.qa.length){
      var qaSec = el("section","section");
      qaSec.appendChild(el("h2","h-sec","つまずきがちなQ&A"));
      b.qa.forEach(function(item){
        var d = el("details","qa-item");
        var s2 = el("summary");
        s2.appendChild(el("span","qa-mark","Q"));
        s2.appendChild(el("span",null, item.q));
        d.appendChild(s2);
        d.appendChild(el("p","qa-a", item.a));
        qaSec.appendChild(d);
      });
      app.appendChild(qaSec);
    }

    /* ⑥ 今日の最初の一歩 */
    var fsSec = el("section","section card first-step");
    fsSec.appendChild(el("h2","h-sec","今日の最初の一歩（15分でOK）"));
    fsSec.appendChild(el("p",null, b.firstStep || ""));
    app.appendChild(fsSec);

    /* ⑦ 回遊導線 */
    var navSec = el("section","section btn-row");
    var toQuiz = el("button","btn", getResult() ? "診断結果に戻る" : "診断で相性をチェックする");
    toQuiz.type = "button";
    toQuiz.addEventListener("click", function(){ location.hash = getResult() ? "#/result" : "#/quiz"; });
    navSec.appendChild(toQuiz);
    var toL = el("button","btn","ほかの副業を見る");
    toL.type = "button";
    toL.addEventListener("click", function(){ location.hash = "#/list"; });
    navSec.appendChild(toL);
    app.appendChild(navSec);
  }

  /* ---------- 一覧（#/list） ---------- */
  function renderList(){
    app.textContent = "";
    var lp = DATA.listPage || {};
    app.appendChild(el("h1",null, lp.title || "副業一覧"));
    if(lp.intro) app.appendChild(el("p","muted section-intro", lp.intro));
    var wrap = el("div","list-wrap");
    businesses().forEach(function(b, i){
      var c = el("button","card list-card fade-up");
      c.type = "button";
      if(!prefersReducedMotion()) c.style.animationDelay = (i*0.03)+"s";
      c.appendChild(el("p","label", b.name));
      if(b.catch) c.appendChild(el("p","muted", b.catch));
      var meta = el("p","meta-row");
      var lStar = el("span","stars", starStr(b.difficulty));
      lStar.setAttribute("role","img");
      lStar.setAttribute("aria-label","むずかしさ "+b.difficulty+"／5段階");
      var lDiff = el("span",null);
      lDiff.appendChild(lStar);
      var lLab = el("span",null," むずかしさ");
      lLab.setAttribute("aria-hidden","true");
      lDiff.appendChild(lLab);
      meta.appendChild(lDiff);
      meta.appendChild(el("span",null, boltStr(b.speed)+" 初収益の速さ"));
      meta.appendChild(el("span",null, "⏱ "+(b.timeToStart || "")));
      c.appendChild(meta);
      c.addEventListener("click", function(){ location.hash = "#/biz/"+b.id; });
      wrap.appendChild(c);
    });
    app.appendChild(wrap);
    var backSec = el("div","section btn-row");
    var toQuiz = el("button","btn btn-primary","診断であなた向けを見つける");
    toQuiz.type = "button";
    toQuiz.addEventListener("click", function(){ location.hash = "#/quiz"; });
    backSec.appendChild(toQuiz);
    app.appendChild(backSec);
  }

  /* ---------- 初期化（ヘッダー / フッター / テーマ / ルーター） ---------- */
  var themeBtn = document.getElementById("themeToggle");
  function syncThemeBtn(){
    var t = document.documentElement.getAttribute("data-theme");
    themeBtn.textContent = t==="light" ? "🌙" : "☀️";
    themeBtn.setAttribute("aria-label", t==="light" ? "ダークテーマに切り替え" : "ライトテーマに切り替え");
  }
  themeBtn.addEventListener("click", function(){
    var t = document.documentElement.getAttribute("data-theme")==="light" ? "dark" : "light";
    document.documentElement.setAttribute("data-theme", t);
    lsSet("theme", t);
    syncThemeBtn();
  });
  syncThemeBtn();

  document.getElementById("brand").textContent = DATA.appName || "AI副業 適性診断";
  document.title = DATA.appName || document.title;

  var foot = document.getElementById("footNote");
  foot.textContent = "";
  if(DATA.disclaimer) foot.appendChild(el("p",null, DATA.disclaimer));
  foot.appendChild(el("p","note","会社員の方は、お勤め先の就業規則で副業が認められているかを事前にご確認ください。"));
  foot.appendChild(el("p","note","副業の所得が年間20万円を超えると確定申告が必要になる場合があります（住民税の申告は別途必要なことがあります）。詳しくは最新の情報や専門家にご確認ください。"));
  foot.appendChild(el("p","note","version "+(DATA.version || "-")));

  /* リロード時にブラウザが行う非同期のスクロール位置復元を無効化。
     このSPAは render() が毎ルートで scrollTo(0,0) を行い自前でスクロール管理するため、
     復元が後から走ると視座がずれ、クリックの mousedown/mouseup が別要素に落ちて
     クリック不成立になる競合が起こりうる */
  if("scrollRestoration" in history){
    try{ history.scrollRestoration = "manual"; }catch(e){}
  }

  window.addEventListener("hashchange", render);
  render();
})();
</script>
